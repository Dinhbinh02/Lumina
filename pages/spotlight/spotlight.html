<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina</title>
    <script src="init.js"></script>
    <link rel="stylesheet" href="../../assets/styles/styles.css">
    <link rel="stylesheet" href="../../lib/vendor/katex/katex.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Google+Sans:wght@400;500;600&family=Google+Sans+Text:wght@400;500;600&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>

<body class="lumina-spotlight-page" data-theme="light">

    <div class="lumina-app-container">
        <!-- Sidebar -->
        <aside class="lumina-sidebar" id="lumina-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <svg class="sidebar-logo" viewBox="0 0 24 24" width="24" height="24" fill="none">
                        <defs>
                            <linearGradient id="lumina-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ea4335" />
                                <stop offset="35%" stop-color="#fb8c00" />
                                <stop offset="70%" stop-color="#4285f4" />
                                <stop offset="100%" stop-color="#34a853" />
                            </linearGradient>
                        </defs>
                        <path d="M12 12c-1.3-1.9-3.3-3.5-5.5-3.5C4 8.5 2 10.5 2 13s2 4.5 4.5 4.5c2.2 0 4.2-1.6 5.5-3.5 1.3 1.9 3.3 3.5 5.5 3.5 2.5 0 4.5-2 4.5-4.5s-2-4.5-4.5-4.5c-2.2 0-4.2 1.6-5.5 3.5z" stroke="url(#lumina-logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="brand-name">Lumina</span>
                </div>
                <div class="sidebar-header-actions">
                    <button class="sidebar-header-btn search-btn" id="sidebar-search-btn" title="Search chats">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="6" />
                            <path d="M16 16l5 5" />
                        </svg>
                    </button>
                    <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="Collapse menu">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="4" />
                            <line x1="9" y1="3" x2="9" y2="21" />
                        </svg>
                    </button>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="sidebar-nav-item" id="sidebar-new-chat-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 4H9a5 5 0 0 0-5 5v6a5 5 0 0 0 5 5h6a5 5 0 0 0 5-5v-4" />
                        <path d="M10 12l8-8a1.414 1.414 0 0 1 2 2l-8 8a1.414 1.414 0 0 1-2-2z" />
                    </svg>
                    <span class="nav-text">New chat</span>
                </button>
                <button class="sidebar-nav-item disabled" id="sidebar-images-btn" disabled title="Coming soon">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="5" />
                        <path d="M3 14c4-4 8 0 12-4s4 4 6 6" />
                        <circle cx="9" cy="8" r="1.5" />
                    </svg>
                    <span class="nav-text">Images</span>
                </button>
                <button class="sidebar-nav-item" id="sidebar-live-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="5" width="18" height="14" rx="4" />
                        <path d="M7 5v3h10V5" />
                    </svg>
                    <span class="nav-text">Live</span>
                </button>
                <button class="sidebar-nav-item disabled" id="sidebar-sparks-btn" disabled title="Coming soon">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="6" width="6" height="4" rx="2" />
                        <rect x="14" y="6" width="6" height="8" rx="3" />
                        <rect x="4" y="14" width="6" height="6" rx="3" />
                        <rect x="14" y="18" width="6" height="4" rx="2" />
                    </svg>
                    <span class="nav-text">Sparks</span>
                </button>
            </nav>

            <div class="sidebar-recent-section">
                <div class="recent-title">Recent</div>
                <div class="recent-chats-list" id="sidebar-recent-chats">
                    <!-- Dynamic chat history items -->
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">DB</div>
                    <span class="user-name">Dinh Binh</span>
                </div>
                <button class="sidebar-footer-btn settings-btn" id="sidebar-settings-btn" title="Settings">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="lumina-main-content">
            <header class="topbar" id="spotlight-topbar">
                <button class="topbar__action-btn" id="topbar-hamburger-btn" title="Toggle Sidebar">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="lumina-model-selector" id="topbar-model-selector">
                    <button class="lumina-model-btn" id="topbar-model-btn">
                        <span class="lumina-current-model" id="topbar-model-label">Loading...</span>
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
                            style="opacity: 0.6; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;">
                            <path d="M6 9l6 6 6-6" />
                        </svg>
                    </button>
                    <div class="lumina-model-dropdown" id="topbar-model-dropdown"></div>
                </div>
                <div class="topbar__spacer"></div>
                <div class="topbar__actions">
                    <button class="topbar__action-btn" id="topbar-popout-btn" title="Pop out" style="display:none;">
                        <svg id="topbar-popout-icon" viewBox="0 0 24 24" width="17" height="17" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h6v6" />
                            <path d="M10 14L21 3" />
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                        </svg>
                    </button>
                    <button class="topbar__action-btn" id="topbar-new-chat-btn" title="New Chat">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 4H9a5 5 0 0 0-5 5v6a5 5 0 0 0 5 5h6a5 5 0 0 0 5-5v-4" />
                            <path d="M10 12l8-8a1.414 1.414 0 0 1 2 2l-8 8a1.414 1.414 0 0 1-2-2z" />
                        </svg>
                    </button>
                    <div class="topbar__menu-container">
                        <button class="topbar__action-btn" id="topbar-more-btn" title="More Options">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                <circle cx="12" cy="5" r="2" />
                                <circle cx="12" cy="12" r="2" />
                                <circle cx="12" cy="19" r="2" />
                            </svg>
                        </button>
                        <div class="topbar__dropdown-menu" id="topbar-dropdown-menu" style="display: none;"></div>
                    </div>
                </div>
                <div class="topbar-progress" id="topbar-progress"></div>
            </header>

            <div class="layout">
                <div class="lumina-chat-container">
                    <div class="lumina-chat-scroll-content" id="chat-history">
                    </div>
                </div>
                <div class="lumina-chat-input-container" id="input-area">
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" multiple style="display: none;">

    <script src="../../lib/vendor/katex/katex.min.js" defer></script>
    <script src="../../lib/vendor/katex/auto-render.min.js" defer></script>
    <script src="../../lib/vendor/marked.min.js" defer></script>
    <script src="../../lib/vendor/highlight.min.js" defer></script>
    <script src="../../lib/core/constants.js" defer></script>
    <script src="../../lib/helpers/annotation_utils.js" defer></script>
    <script src="../../lib/helpers/selection_utils.js" defer></script>
    <script src="../../lib/parsers/cambridge_parser.js" defer></script>
    <script src="../../lib/parsers/oxford_parser.js" defer></script>
    <script src="../../lib/ui/dictionary_popup.js" defer></script>
    <script src="../../lib/ui/common.js" defer></script>
    <script src="../../lib/core/auth.js" defer></script>
    <script src="../../lib/core/chat_history.js" defer></script>
    <script src="../../lib/ui/history_panel.js" defer></script>
    <script src="../../lib/vendor/gpt-tokenizer.js" defer></script>
    <script src="../../lib/core/token_utils.js" defer></script>
    <script src="spotlight.js" defer></script>
</body>

</html>
