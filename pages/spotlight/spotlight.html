<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina</title>
    <link rel="stylesheet" href="../../assets/styles/styles.css">
    <link rel="stylesheet" href="../../lib/katex/katex.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .lumina-chat-container {
            width: 100% !important;
            flex: 1 !important;
            height: auto !important;
            max-height: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            display: flex;
            flex-direction: column;
            background: #FFFFFF !important;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        .lumina-chat-scroll-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'Montserrat', sans-serif;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 10px 10px 0 10px;
        }

        .lumina-chat-scroll-content::-webkit-scrollbar {
            display: none !important;
        }

        .spotlight-sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 4px 10px;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            scrollbar-gutter: stable;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .spotlight-sidebar-content::-webkit-scrollbar {
            display: none !important;
        }

        .lumina-input-container {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .lumina-hover-trigger {
            display: none;
        }

        .lumina-chat-input-wrapper {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            right: auto !important;
            padding: 0 10px 10px 10px;
            pointer-events: auto !important;
            width: 100%;
            background: #FFFFFF !important;
        }

        #input-area {
            overflow: visible !important;
            z-index: 1000 !important;
            position: relative !important;
        }

        .lumina-chat-input {
            font-size: 13px !important;
        }

        .lumina-translation-text,
        .lumina-translation-card,
        .lumina-proofread-card,
        .lumina-proofread-text {
            font-family: 'Montserrat', sans-serif !important;
        }

        .spotlight-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #5f6368;
            margin: 0 2px 0 8px;
            padding: 0;
            flex-shrink: 0;
            -webkit-app-region: no-drag;
            transition: background 0.15s, color 0.15s;
        }

        .spotlight-menu-btn:hover {
            background: rgba(0, 0, 0, 0.07);
            color: #202124;
        }

        .spotlight-menu-btn:active {
            background: rgba(0, 0, 0, 0.12);
        }

        .spotlight-sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            z-index: 1100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spotlight-sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Sidebar Panel */
        .spotlight-sidebar {
            position: fixed;
            top: 8px;
            left: 8px;
            bottom: 8px;
            width: 290px;
            background: #ffffff;
            border-radius: 16px;
            z-index: 1101;
            transform: translateX(calc(-100% - 16px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .spotlight-sidebar.active {
            transform: translateX(0);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .spotlight-sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            font-weight: 600;
            font-size: 13px;
            color: #333;
            letter-spacing: -0.01em;
        }

        .spotlight-sidebar-close {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: #f2f2f2;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .spotlight-sidebar-close:hover {
            background: #e8e8e8;
            color: #333;
        }

        .spotlight-sidebar-close svg {
            width: 12px;
            height: 12px;
        }

        .spotlight-sidebar-search {
            position: relative;
            padding: 0px 12px 8px 12px;
        }

        .spotlight-search-icon {
            position: absolute;
            left: 22px;
            top: 9px;
            color: #999;
            pointer-events: none;
        }

        .spotlight-sidebar-search input {
            width: 100%;
            padding: 8px 12px 8px 32px;
            border: none;
            border-radius: 10px;
            background: #f5f5f5;
            font-family: inherit;
            font-size: 12px;
            color: #333;
            outline: none;
            transition: none;
        }

        .spotlight-sidebar-search input::placeholder {
            color: #aaa;
        }

        .spotlight-sidebar-search input:focus {
            background: #efefef;
        }

        .spotlight-search-clear {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(calc(-50% - 4px));
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: none;
        }

        .spotlight-search-clear:hover {
            background: rgba(0, 0, 0, 0.1);
            color: #666;
        }

        .spotlight-history-item {
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background-color 0.2s ease;
        }

        .spotlight-history-item:hover {
            background: #f5f5f5;
        }

        .spotlight-history-item.active {
            background: #f0f0f0;
        }

        .spotlight-history-title {
            font-size: 12px;
            font-weight: 520;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
            letter-spacing: -0.01em;
        }

        .spotlight-history-date {
            font-size: 10px;
            color: #999;
            font-weight: 400;
        }

        .spotlight-history-empty {
            text-align: center;
            padding: 32px 16px;
            color: #aaa;
            font-size: 12px;
        }

        .spotlight-history-empty p:first-child {
            font-weight: 520;
            color: #888;
            margin-bottom: 6px;
        }

        /* Split View Styles */
        .spotlight-main-area {
            display: flex;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .spotlight-pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            position: relative;
            background: #fff;
        }

        #pane-primary {
            flex: 1;
            /* Default full width */
        }

        #pane-secondary {
            border-left: none;
            position: relative;
        }

        #pane-secondary::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: #e8e8e8;
        }

        .spotlight-pane-divider {
            width: 14px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            position: relative;
            z-index: 100;
            margin: 0 -7px;
            transition: background 0.18s;
        }

        .spotlight-pane-divider:hover,
        .spotlight-pane-divider.dragging {
            background: transparent;
        }

        .spotlight-pane-divider::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 15%;
            height: 70%;
            width: 1px;
            background: #ececec;
            transform: translateX(-50%);
            transition: background 0.18s, width 0.18s;
        }

        .spotlight-pane-divider:hover::after,
        .spotlight-pane-divider.dragging::after {
            background: rgba(0, 86, 210, 0.35);
            width: 2px;
        }

        .spotlight-pane-divider.snapped::after {
            background: rgba(0, 86, 210, 0.85);
            width: 3px;
            top: 10%;
            height: 80%;
        }

        /* Resizing Overlay to prevent iframe/selection issues */
        .spotlight-resizing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            cursor: col-resize;
            display: none;
        }

        /* Drop Zone Visuals */
        .spotlight-tab.drop-target-split::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            right: 0;
            background: rgba(0, 86, 210, 0.1);
            border-left: 2px dashed #0056D2;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>

<body data-theme="light">
    <div class="spotlight-sidebar" id="spotlight-sidebar">
        <div class="spotlight-sidebar-header">
            <span>Chat History</span>
            <button class="spotlight-sidebar-close" id="sidebar-close-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="spotlight-sidebar-search">
            <svg class="spotlight-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
            </svg>
            <input type="text" id="sidebar-search-input" placeholder="Search questions..." />
            <button class="spotlight-search-clear" id="sidebar-search-clear" style="display: none;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
        <div class="spotlight-sidebar-content" id="sidebar-history-list">
        </div>
    </div>

    <div class="spotlight-sidebar-overlay" id="sidebar-overlay"></div>

    <div class="spotlight-tabs-bar" id="tabs-bar" style="display: none;">
        <button class="spotlight-menu-btn" id="menu-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
        </button>
        <div class="spotlight-tabs-list" id="tabs-list">
            <button class="spotlight-new-tab-btn" id="new-tab-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </button>
        </div>
    </div>

    <div class="spotlight-main-area" id="spotlight-main-area">
        <div class="spotlight-pane" id="pane-primary">
            <div class="lumina-chat-container">
                <div class="lumina-chat-scroll-content" id="chat-history">
                </div>
            </div>
            <div class="lumina-chat-input-container" id="input-area-primary">
            </div>
        </div>

        <div class="spotlight-pane-divider" id="pane-divider" style="display: none;"></div>

        <div class="spotlight-pane" id="pane-secondary" style="display: none;">
            <div class="lumina-chat-container">
                <!-- Secondary chat history will be moved here -->
            </div>
            <div class="lumina-chat-input-container" id="input-area-secondary">
            </div>
        </div>
    </div>

    <div class="spotlight-resizing-overlay" id="resizing-overlay"></div>

    <input type="file" id="file-input" multiple style="display: none;">

    <script src="../../lib/katex/katex.min.js"></script>
    <script src="../../lib/katex/auto-render.min.js"></script>
    <script src="../../lib/marked.min.js"></script>
    <script src="../../lib/highlight.min.js"></script>
    <script src="../../lib/utils/constants.js"></script>
    <script src="../../lib/utils/chat_ui.js"></script>
    <script src="spotlight.js"></script>
</body>

</html>
