<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina</title>
    <link rel="stylesheet" href="../../assets/styles/styles.css">
    <link rel="stylesheet" href="../../lib/katex/katex.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            min-width: 0 !important;
        }

        body {
            background: transparent;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            min-width: 0 !important;
            display: flex;

            flex-direction: column;
            overflow: hidden;
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 0.8125em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .lumina-chat-container {
            width: 100% !important;
            flex: 1 !important;
            height: auto !important;
            max-height: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            display: flex;
            flex-direction: column;
            background: #FFFFFF !important;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        .lumina-chat-scroll-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'Montserrat', sans-serif;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 10px 10px 0 10px;
        }

        .lumina-chat-scroll-content::-webkit-scrollbar {
            display: none !important;
        }

        .lumina-input-container {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .lumina-hover-trigger {
            display: none;
        }

        .lumina-chat-input-wrapper {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            right: auto !important;
            padding: 0 10px 10px 10px;
            pointer-events: auto !important;
            width: 100%;
            background: #FFFFFF !important;
        }

        #input-area {
            overflow: visible !important;
            z-index: 1000 !important;
            position: relative !important;
        }

        .lumina-chat-input {
            font-size: 0.8125em !important;
        }

        .lumina-translation-text,
        .lumina-translation-card,
        .lumina-proofread-card,
        .lumina-proofread-text {
            font-family: 'Montserrat', sans-serif !important;
        }

        /* Split View Styles */
        .spotlight-main-area {
            display: flex;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .spotlight-pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
            position: relative;
            background: #fff;
        }

        #pane-primary {
            flex: 1;
            /* Default full width */
        }

        #pane-secondary {
            border-left: none;
            position: relative;
        }

        #pane-secondary::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: #e8e8e8;
        }

        .spotlight-pane-divider {
            width: 14px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            position: relative;
            z-index: 100;
            margin: 0 -7px;
            transition: background 0.18s;
        }

        .spotlight-pane-divider:hover,
        .spotlight-pane-divider.dragging {
            background: transparent;
        }

        .spotlight-pane-divider::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 15%;
            height: 70%;
            width: 1px;
            background: #ececec;
            transform: translateX(-50%);
            transition: background 0.18s, width 0.18s;
        }

        .spotlight-pane-divider:hover::after,
        .spotlight-pane-divider.dragging::after {
            background: rgba(0, 86, 210, 0.35);
            width: 2px;
        }

        .spotlight-pane-divider.snapped::after {
            background: rgba(0, 86, 210, 0.85);
            width: 3px;
            top: 10%;
            height: 80%;
        }

        /* Resizing Overlay to prevent iframe/selection issues */
        .spotlight-resizing-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            cursor: col-resize;
            display: none;
        }

        /* Drop Zone Visuals */
        .spotlight-tab.drop-target-split::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            right: 0;
            background: rgba(0, 86, 210, 0.1);
            border-left: 2px dashed #0056D2;
            z-index: 20;
            pointer-events: none;
        }
    </style>
</head>

<body data-theme="light">


    <div class="spotlight-tabs-bar" id="tabs-bar" style="display: none;">
        <button class="lumina-history-toggle-btn" id="lumina-history-toggle-btn" title="Chat History">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="spotlight-tabs-list" id="tabs-list">
            <button class="spotlight-new-tab-btn" id="new-tab-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" shape-rendering="geometricPrecision">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </button>
        </div>
    </div>

    <div class="spotlight-main-area" id="spotlight-main-area">
        <div class="spotlight-pane" id="pane-primary">
            <div class="lumina-chat-container">
                <div class="lumina-chat-scroll-content" id="chat-history">
                </div>
            </div>
            <div class="lumina-chat-input-container" id="input-area-primary">
            </div>
        </div>

        <div class="spotlight-pane-divider" id="pane-divider" style="display: none;"></div>

        <div class="spotlight-pane" id="pane-secondary" style="display: none;">
            <div class="lumina-chat-container">
                <!-- Secondary chat history will be moved here -->
            </div>
            <div class="lumina-chat-input-container" id="input-area-secondary">
            </div>
        </div>
    </div>

    <div class="spotlight-resizing-overlay" id="resizing-overlay"></div>

    <div id="lumina-history-overlay" class="lumina-history-overlay"></div>

    <!-- Chat History Sidebar -->
    <div id="lumina-history-sidebar" class="lumina-history-sidebar">
        <div class="lumina-history-sidebar-header">
            <h2>Chat History</h2>
            <button id="lumina-history-close-btn" class="lumina-history-close-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="lumina-history-search-container">
            <input type="text" id="lumina-history-search-input" placeholder="Search questions..." autocomplete="off">
            <div id="lumina-history-loader" class="lumina-history-loader" style="display: none;">
                <div class="lumina-history-loader-bar"></div>
            </div>
        </div>
        <div class="lumina-history-list-container" id="lumina-history-list-container">
            <!-- Lazy-loaded history cards will appear here -->
        </div>
        <div class="lumina-history-sidebar-footer">
            <div class="lumina-history-storage-info">
                <span id="storage-usage-text">0 MB</span> used
            </div>
            <button id="lumina-history-delete-all-btn" class="lumina-history-delete-all-btn">Delete All</button>
        </div>
    </div>
    
    <!-- Custom Context Menu for History Items -->
    <div id="lumina-history-context-menu" class="lumina-history-context-menu" style="display: none;">
        <div class="lumina-history-menu-item" id="menu-rename">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Rename
        </div>
        <div class="lumina-history-menu-item" id="menu-duplicate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Duplicate
        </div>
        <div class="lumina-history-menu-divider"></div>
        <div class="lumina-history-menu-item menu-danger" id="menu-delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Delete
        </div>
    </div>

    <input type="file" id="file-input" multiple style="display: none;">

    <script src="../../lib/katex/katex.min.js"></script>
    <script src="../../lib/katex/auto-render.min.js"></script>
    <script src="../../lib/marked.min.js"></script>
    <script src="../../lib/highlight.min.js"></script>
    <script src="../../lib/utils/constants.js"></script>
    <script src="../../lib/utils/selection_utils.js"></script>
    <script src="../../lib/utils/cambridge_parser.js"></script>
    <script src="../../lib/utils/oxford_parser.js"></script>
    <script src="../../lib/utils/dictionary_popup.js"></script>
    <script src="../../lib/utils/common.js"></script>
    <script src="../../lib/utils/chat_history.js"></script>
    <script src="../../lib/utils/history_panel.js"></script>
    <script src="spotlight.js"></script>
</body>

</html>
