<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina</title>
    <link rel="stylesheet" href="../../assets/styles/styles.css">
    <link rel="stylesheet" href="../../lib/vendor/katex/katex.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>

<body class="lumina-spotlight-page" data-theme="light">


    <div class="spotlight-tabs-bar" id="tabs-bar" style="display: none;">
        <button class="lumina-history-toggle-btn" id="lumina-history-toggle-btn" title="Chat History">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="spotlight-tabs-list" id="tabs-list">
            <button class="spotlight-new-tab-btn" id="new-tab-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" shape-rendering="geometricPrecision">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </button>
        </div>
    </div>

    <div class="spotlight-main-area" id="spotlight-main-area">
        <div class="spotlight-pane" id="pane-primary">
            <div class="lumina-chat-container">
                <div class="lumina-chat-scroll-content" id="chat-history">
                </div>
            </div>
            <div class="lumina-chat-input-container" id="input-area-primary">
            </div>
        </div>

        <div class="spotlight-pane-divider" id="pane-divider" style="display: none;"></div>

        <div class="spotlight-pane" id="pane-secondary" style="display: none;">
            <div class="lumina-chat-container">
                
            </div>
            <div class="lumina-chat-input-container" id="input-area-secondary">
            </div>
        </div>
    </div>

    <div class="spotlight-resizing-overlay" id="resizing-overlay"></div>

    <div id="lumina-history-overlay" class="lumina-history-overlay"></div>

    
    <div id="lumina-history-sidebar" class="lumina-history-sidebar">
        <div class="lumina-history-sidebar-header">
            <h2>Chat History</h2>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button id="lumina-history-settings-btn" class="lumina-history-settings-btn" title="Lumina Settings" style="background: none; border: none; padding: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary, #70757a); border-radius: 50%; transition: background-color 0.2s, color 0.2s, transform 0.3s ease;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <button id="lumina-history-close-btn" class="lumina-history-close-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        <div class="lumina-history-search-container">
            <input type="text" id="lumina-history-search-input" placeholder="Search questions..." autocomplete="off">
            <div id="lumina-history-loader" class="lumina-history-loader" style="display: none;">
                <div class="lumina-history-loader-bar"></div>
            </div>
        </div>
        <div class="lumina-history-list-container" id="lumina-history-list-container">
            
        </div>
        <div class="lumina-history-sidebar-footer">
            <div class="lumina-history-sync-profile" id="lumina-history-sync-profile">
                <!-- Will be dynamically populated with avatar, sync status, sync button and logout button -->
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 10px;">
                <div class="lumina-history-storage-info">
                    <span id="storage-usage-text">0 MB</span> used
                </div>
                <button id="lumina-history-delete-all-btn" class="lumina-history-delete-all-btn">Delete All</button>
            </div>
        </div>
    </div>
    
    
    <div id="lumina-history-context-menu" class="lumina-history-context-menu" style="display: none;">
        <div class="lumina-history-menu-item" id="menu-rename">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Rename
        </div>
        <div class="lumina-history-menu-item" id="menu-duplicate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Duplicate
        </div>
        <div class="lumina-history-menu-divider"></div>
        <div class="lumina-history-menu-item menu-danger" id="menu-delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Delete
        </div>
    </div>

    <input type="file" id="file-input" multiple style="display: none;">

    <script src="../../lib/vendor/katex/katex.min.js" defer></script>
    <script src="../../lib/vendor/katex/auto-render.min.js" defer></script>
    <script src="../../lib/vendor/marked.min.js" defer></script>
    <script src="../../lib/vendor/highlight.min.js" defer></script>
    <script src="../../lib/core/constants.js" defer></script>
    <script src="../../lib/helpers/annotation_utils.js" defer></script>
    <script src="../../lib/helpers/selection_utils.js" defer></script>
    <script src="../../lib/parsers/cambridge_parser.js" defer></script>
    <script src="../../lib/parsers/oxford_parser.js" defer></script>
    <script src="../../lib/ui/dictionary_popup.js" defer></script>
    <script src="../../lib/ui/common.js" defer></script>
    <script src="../../lib/core/auth.js" defer></script>
    <script src="../../lib/core/chat_history.js" defer></script>
    <script src="../../lib/ui/history_panel.js" defer></script>
    <script src="../../lib/vendor/gpt-tokenizer.js" defer></script>
    <script src="../../lib/core/token_utils.js" defer></script>
    <script src="spotlight.js" defer></script>
</body>

</html>
