<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lumina Proxy</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; display: block; background: #fff; }
    </style>
</head>
<body>
    <iframe id="proxy-iframe" src="about:blank"></iframe>
    <script>
        
        const params = new URLSearchParams(window.location.search);
        let targetUrl = params.get('url');
        
        if (targetUrl) {
            console.log('Lumina Proxy initiating load for:', targetUrl);
            const iframe = document.getElementById('proxy-iframe');
            
            
            try {
                targetUrl = decodeURIComponent(targetUrl);
                if (!targetUrl.startsWith('http')) {
                    
                    targetUrl = decodeURIComponent(targetUrl);
                }
            } catch(e) {}

            
            iframe.src = targetUrl;
        } else {
            document.body.innerHTML = '<div style="padding:20px; font-family:sans-serif; color:#666;">Waiting for URL...</div>';
        }
    </script>
</body>
</html>
